<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tabliczka mnożenia JS</title>
</head>

<body>

<h2>Tabliczka mnożenia (JavaScript)</h2>

<input type="number" id="range" value="10">
<button onclick="generateTable()">Generuj</button>

<div id="table"></div>

<script>

function generateTable(){

let range = document.getElementById("range").value;
let container = document.getElementById("table");

container.innerHTML = "";

// TABLICA
let tabela = new Array(range);

// wypełnianie tablicy
for(let i=0;i<range;i++){

    tabela[i] = new Array(range);

    for(let j=0;j<range;j++){

        tabela[i][j] = (i+1)*(j+1);

    }
}

// tworzenie tabeli w JS
let table = document.createElement("table");
table.border = "1";

for(let i=0;i<range;i++){

    let row = document.createElement("tr");

    for(let j=0;j<range;j++){

        let cell = document.createElement("td");

        cell.textContent = tabela[i][j];

        cell.style.padding = "5px";
        cell.style.textAlign = "center";

        row.appendChild(cell);

    }

    table.appendChild(row);

}

container.appendChild(table);

}

generateTable();

</script>

</body>
</html>

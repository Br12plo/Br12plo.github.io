<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tabliczka mnożenia</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
}

input {
    padding: 5px;
    width: 60px;
    text-align: center;
}

button {
    padding: 6px 12px;
    cursor: pointer;
    margin-left: 5px;
}

#tableContainer {
    margin-top: 20px;
    overflow-x: auto;
}

table {
    margin: 0 auto;
    border-collapse: collapse;
}

td {
    border: 1px solid black;
    text-align: center;
}

.large td {
    padding: 10px;
    font-size: 18px;
}

.medium td {
    padding: 6px;
    font-size: 14px;
}

.small td {
    padding: 3px;
    font-size: 12px;
}

.diagonal {
    background-color: #d4edda;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Tabliczka mnożenia</h1>

<label>Podaj zakres: </label>
<input type="number" id="range" value="10" min="1">
<button onclick="generateTable()">Generuj</button>

<div id="tableContainer"></div>

<script>

function generateTable() {

    const range = parseInt(document.getElementById("range").value);
    const container = document.getElementById("tableContainer");

    container.innerHTML = "";

    const table = document.createElement("table");

    if (range <= 10) {
        table.classList.add("large");
    } else if (range <= 20) {
        table.classList.add("medium");
    } else {
        table.classList.add("small");
    }

    // TABLICA Z new Array()
    let tabela = new Array(range);

    for (let i = 0; i < range; i++) {

        tabela[i] = new Array(range);

        for (let j = 0; j < range; j++) {

            tabela[i][j] = (i + 1) * (j + 1);

        }

    }

    // tworzenie tabeli z tablicy
    for (let i = 0; i < range; i++) {

        const row = document.createElement("tr");

        for (let j = 0; j < range; j++) {

            const cell = document.createElement("td");

            cell.textContent = tabela[i][j];

            if (i === j) {
                cell.classList.add("diagonal");
            }

            row.appendChild(cell);
        }

        table.appendChild(row);
    }

    container.appendChild(table);
}

generateTable();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tabliczka mnożenia JS</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
    background-color: #f0f4f8;
}

input {
    padding: 5px;
    width: 60px;
    text-align: center;
    margin-right: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button {
    padding: 6px 12px;
    cursor: pointer;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
}

button:hover {
    background-color: #0056b3;
}

#tableContainer {
    margin-top: 20px;
    overflow-x: auto;
}

table {
    margin: 0 auto;
    border-collapse: collapse;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

td {
    border: 1px solid #555;
    text-align: center;
    padding: 8px;
    min-width: 35px;
    transition: all 0.2s;
}

td:hover {
    background-color: #ffeaa7;
}

.diagonal {
    background-color: #74b9ff;
    font-weight: bold;
    color: white;
}
</style>
</head>
<body>

<h1>Tabliczka mnożenia</h1>

<label>Podaj zakres:</label>
<input type="number" id="range" value="10" min="1">
<button onclick="generateTable()">Generuj</button>

<div id="tableContainer"></div>

<script>
function generateTable() {

    const range = parseInt(document.getElementById("range").value);
    const container = document.getElementById("tableContainer");

    container.innerHTML = "";

    // TABLICA 2D
    let tabela = new Array(range);
    for(let i=0;i<range;i++){
        tabela[i] = new Array(range);
        for(let j=0;j<range;j++){
            tabela[i][j] = (i+1)*(j+1);
        }
    }

    // TWORZENIE TABELI W JS
    let table = document.createElement("table");

    for(let i=0;i<range;i++){
        let row = document.createElement("tr");

        for(let j=0;j<range;j++){
            let cell = document.createElement("td");
            cell.textContent = tabela[i][j];

            // przekątna
            if(i===j){
                cell.classList.add("diagonal");
            }

            row.appendChild(cell);
        }

        table.appendChild(row);
    }

    container.appendChild(table);
}

// generowanie tabeli przy starcie
generateTable();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przekładanie elementów</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

button{
padding:10px 15px;
margin-bottom:20px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
max-width:400px;
}

li{
background:#333;
padding:15px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:grab;
}

li.dragging{
opacity:0.4;
}

</style>
</head>

<body>

<h1>Lista elementów</h1>

<button id="add">Dodaj element</button>

<ul id="list"></ul>

<script>

const list = document.getElementById("list")
const addBtn = document.getElementById("add")

let counter = 1
let dragged = null


/* DODAWANIE ELEMENTU */

addBtn.onclick = () => {

const li = document.createElement("li")

li.draggable = true

li.innerHTML = `
Element ${counter++}
<button>Usuń</button>
`

/* USUWANIE */

li.querySelector("button").onclick = () => {
li.remove()
}

/* DRAG START */

li.addEventListener("dragstart", () => {
dragged = li
li.classList.add("dragging")
})

/* DRAG END */

li.addEventListener("dragend", () => {
li.classList.remove("dragging")
dragged = null
})

list.appendChild(li)

}


/* MIEJSCE WSTAWIENIA */

list.addEventListener("dragover", e => {

e.preventDefault()

const items = [...list.querySelectorAll("li:not(.dragging)")]

let nextItem = null

for (let item of items){

const box = item.getBoundingClientRect()

if(e.clientY < box.top + box.height / 2){
nextItem = item
break
}

}

if(nextItem){
list.insertBefore(dragged, nextItem)
}else{
list.appendChild(dragged)
}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przekładanie elementów z tablicą</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 40px;
}

button {
    padding: 10px 15px;
    margin-bottom: 20px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    max-width: 400px;
}

li {
    background: #333;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: grab;
}

li.dragging {
    opacity: 0.4;
}
</style>
</head>

<body>

<h1>Lista elementów</h1>

<button id="add">Dodaj element</button>

<ul id="list"></ul>

<script>
const list = document.getElementById("list");
const addBtn = document.getElementById("add");

let counter = 1;
let draggedIndex = null; 
let items = [];          // główna tablica
let newArray = [];       // dodatkowa tablica (np. backup)

function render() {
    list.innerHTML = "";
    items.forEach((text, index) => {
        const li = document.createElement("li");
        li.draggable = true;
        li.dataset.index = index;

        li.innerHTML = `
            ${text}
            <button>Usuń</button>
        `;

        li.querySelector("button").onclick = () => {
            items.splice(index, 1);
            render();
        };

        li.addEventListener("dragstart", () => {
            draggedIndex = index;
            li.classList.add("dragging");
        });

        li.addEventListener("dragend", () => {
            li.classList.remove("dragging");
            draggedIndex = null;
        });

        list.appendChild(li);
    });
}

// Dodawanie nowego elementu
addBtn.onclick = () => {
    const newItem = "Element " + counter++;
    items.push(newItem);
    newArray.push(newItem); // zapisujemy element w dodatkowej tablicy
    render();
};

// Drag over
list.addEventListener("dragover", e => {
    e.preventDefault();

    const draggingEl = list.querySelector(".dragging");
    const itemsHTML = [...list.querySelectorAll("li:not(.dragging)")];
    let nextItem = null;

    for (let item of itemsHTML) {
        const box = item.getBoundingClientRect();
        if (e.clientY < box.top + box.height / 2) {
            nextItem = item;
            break;
        }
    }

    if (nextItem) {
        list.insertBefore(draggingEl, nextItem);
    } else {
        list.appendChild(draggingEl);
    }

    // Aktualizacja tablicy items w czasie rzeczywistym
    const updatedItems = [];
    list.querySelectorAll("li").forEach(li => {
        updatedItems.push(li.textContent.replace("Usuń","").trim());
    });
    items = updatedItems;
});

</script>

</body>
</html>

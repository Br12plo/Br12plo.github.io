<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przekładanie w JS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial;
background:#111;
color:#dfff3f;
padding:30px;
}

h1,h2{margin-bottom:15px}

button{
background:#dfff3f;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

ul{list-style:none}

li{
background:#000;
padding:16px;
margin-bottom:10px;
border-left:5px solid #dfff3f;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

li.scrap{cursor:grab}
li.dragging{opacity:0.4}

#gallery img{
width:200px;
cursor:pointer;
border-radius:10px;
margin-right:10px;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox.active{display:flex}

#lightbox img{max-width:80%}

#close{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Drag & Drop demo</h1>

<h2>Złom</h2>

<button id="addScrap">Dodaj złom</button>

<ul id="scrapList"></ul>

<h2>Galeria</h2>

<div id="gallery">
<img src="https://picsum.photos/600/400?1">
<img src="https://picsum.photos/600/400?2">
<img src="https://picsum.photos/600/400?3">
</div>

<div id="lightbox">
<span id="close">✖</span>
<img id="lightboxImg">
</div>

<script>

/* DANE */

const scrapItems=[
"Rura 🔧",
"Elektronika 💾",
"Monitor 📺",
"Pancerz 🛡️",
"Moduł ⚡"
]

const scrapList=document.getElementById("scrapList")

/* TWORZENIE ELEMENTU */

function createScrap(){

const li=document.createElement("li")
li.classList.add("scrap")
li.draggable=true

li.textContent=
scrapItems[Math.floor(Math.random()*scrapItems.length)]

return li
}

/* DODAWANIE */

document.getElementById("addScrap").addEventListener("click",()=>{
scrapList.appendChild(createScrap())
})

/* STARTOWE ELEMENTY */

for(let i=0;i<4;i++){
scrapList.appendChild(createScrap())
}

/* DRAG */

let dragged=null

scrapList.addEventListener("dragstart",e=>{

if(e.target.classList.contains("scrap")){

dragged=e.target
e.target.classList.add("dragging")

/* wymagane w wielu przeglądarkach */
e.dataTransfer.setData("text","")

}

})

scrapList.addEventListener("dragend",e=>{
e.target.classList.remove("dragging")
})

scrapList.addEventListener("dragover",e=>{

e.preventDefault()

const after=getAfterElement(scrapList,e.clientY)

if(after==null){
scrapList.appendChild(dragged)
}else{
scrapList.insertBefore(dragged,after)
}

})

function getAfterElement(container,y){

const elements=[...container.querySelectorAll(".scrap:not(.dragging)")]

let closest=null
let closestOffset=Number.NEGATIVE_INFINITY

elements.forEach(el=>{

const box=el.getBoundingClientRect()
const offset=y-box.top-box.height/2

if(offset<0 && offset>closestOffset){
closestOffset=offset
closest=el
}

})

return closest

}

/* LIGHTBOX */

const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightboxImg")

document.querySelectorAll("#gallery img").forEach(img=>{

img.addEventListener("click",()=>{
lightbox.classList.add("active")
lightboxImg.src=img.src
})

})

document.getElementById("close").onclick=()=>{
lightbox.classList.remove("active")
}

</script>

</body>
</html>

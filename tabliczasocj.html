<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablica asocjacyjna JS</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:12px;
    width:380px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:15px;
}

input{
    width:90%;
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    margin:4px;
    border:none;
    border-radius:6px;
    background:#4facfe;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0077ff;
    transform:scale(1.05);
}

#wynik{
    margin-top:15px;
    text-align:left;
}

</style>
</head>

<body>

<div class="container">

<h2>Tablica asocjacyjna</h2>

<input id="klucz" placeholder="Podaj klucz (np. imie)">
<input id="wartosc" placeholder="Podaj wartość">

<br>

<button onclick="dodaj()">Dodaj</button>
<button onclick="pokaz()">Pokaż wszystko</button>
<button onclick="usun()">Usuń klucz</button>
<button onclick="czyIstnieje()">Sprawdź klucz</button>
<button onclick="policz()">Policz elementy</button>
<button onclick="szukaj()">Szukaj wartości</button>
<button onclick="wyczysc()">Wyczyść tablicę</button>

<div id="wynik"></div>

</div>

<script>

let tablica = {};

// dodawanie elementu
function dodaj(){

    let klucz = document.getElementById("klucz").value;
    let wartosc = document.getElementById("wartosc").value;

    if(klucz === "" || wartosc === ""){
        alert("Wpisz klucz i wartość");
        return;
    }

    tablica[klucz] = wartosc;

    document.getElementById("klucz").value="";
    document.getElementById("wartosc").value="";

    pokaz();
}


// wyświetlanie tablicy
function pokaz(){

    let tekst = "";

    for(let k in tablica){
        tekst += "<b>" + k + "</b>: " + tablica[k] + "<br>";
    }

    if(tekst === ""){
        tekst = "Tablica jest pusta";
    }

    document.getElementById("wynik").innerHTML = tekst;

}


// usuwanie elementu
function usun(){

    let klucz = document.getElementById("klucz").value;

    if(klucz in tablica){
        delete tablica[klucz];
        pokaz();
    }else{
        alert("Nie ma takiego klucza");
    }

}


// sprawdzanie czy klucz istnieje
function czyIstnieje(){

    let klucz = document.getElementById("klucz").value;

    if(klucz in tablica){
        alert("Klucz istnieje w tablicy");
    }else{
        alert("Klucz NIE istnieje");
    }

}


// liczenie elementów
function policz(){

    let ile = Object.keys(tablica).length;

    document.getElementById("wynik").innerHTML =
    "Liczba elementów w tablicy: " + ile;

}


// wyszukiwanie wartości
function szukaj(){

    let wartosc = document.getElementById("wartosc").value;
    let znaleziono = false;

    for(let k in tablica){

        if(tablica[k] == wartosc){
            znaleziono = true;
            document.getElementById("wynik").innerHTML =
            "Znaleziono wartość przy kluczu: " + k;
        }

    }

    if(!znaleziono){
        document.getElementById("wynik").innerHTML =
        "Nie znaleziono takiej wartości";
    }

}


// czyszczenie tablicy
function wyczysc(){

    tablica = {};

    document.getElementById("wynik").innerHTML =
    "Tablica została wyczyszczona";

}

</script>

</body>
</html>

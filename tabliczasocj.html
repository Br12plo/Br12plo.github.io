<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tablica asocjacyjna JS</title>
</head>
<body>

<h2>Tablica asocjacyjna w JavaScript</h2>

<p id="wynik"></p>

<script>
    // tablica asocjacyjna (obiekt)
    let osoba = {
        imie: "Jan",
        nazwisko: "Kowalski",
        wiek: 25,
        miasto: "Warszawa"
    };

    // odczyt danych
    let tekst = "Imię: " + osoba.imie + "<br>" +
                "Nazwisko: " + osoba.nazwisko + "<br>" +
                "Wiek: " + osoba.wiek + "<br>" +
                "Miasto: " + osoba.miasto;

    document.getElementById("wynik").innerHTML = tekst;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablica asocjacyjna</title>
</head>
<body>

<h2>Tablica asocjacyjna w JS</h2>

<button onclick="dodaj()">Dodaj dane</button>
<button onclick="pokaz()">Pokaż dane</button>
<button onclick="pobierz()">Pobierz wiek</button>

<p id="wynik"></p>

<script>

// tablica asocjacyjna
let osoba = {};

// funkcja dodająca dane
function dodaj(){
    osoba["imie"] = "Jan";
    osoba["nazwisko"] = "Kowalski";
    osoba["wiek"] = 25;
}

// funkcja pokazująca wszystkie dane
function pokaz(){
    let tekst = "";

    for(let klucz in osoba){
        tekst += klucz + ": " + osoba[klucz] + "<br>";
    }

    document.getElementById("wynik").innerHTML = tekst;
}

// funkcja pobierająca jedną wartość
function pobierz(){
    let wiek = osoba["wiek"];
    document.getElementById("wynik").innerHTML = "Wiek: " + wiek;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamiczne elementy DOM – Premium</title>

<style>
/* =======================
   DESIGN SYSTEM
======================= */
:root {
  --clr-bg: #f6f8fb;
  --clr-surface: #ffffff;
  --clr-text: #1f2937;
  --clr-muted: #6b7280;

  --clr-blue: #2563eb;
  --clr-green: #16a34a;
  --clr-red: #dc2626;

  --radius: 12px;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
}

/* =======================
   RESET + BASE
======================= */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--clr-bg);
  color: var(--clr-text);
  line-height: 1.6;
}

/* =======================
   LAYOUT
======================= */
header {
  padding: 32px 20px;
  text-align: center;
}

main {
  max-width: 1000px;
  margin: auto;
  padding: 0 20px 40px;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 24px;
}

/* =======================
   PANELS
======================= */
.panel {
  background: var(--clr-surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

.panel h2 {
  margin-top: 0;
  font-size: 18px;
}

/* =======================
   FORM
======================= */
label {
  display: block;
  margin-top: 16px;
  font-weight: 600;
}

input,
select,
button {
  width: 100%;
  margin-top: 6px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

input:focus,
select:focus {
  outline: 3px solid rgba(37,99,235,.35);
  border-color: transparent;
}

.error {
  font-size: 13px;
  color: var(--clr-red);
  margin-top: 4px;
}

/* =======================
   BUTTONS
======================= */
.actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

button {
  font-weight: 700;
  cursor: pointer;
  background: #f1f5f9;
}

button.primary {
  background: var(--clr-blue);
  color: white;
}

button:hover {
  filter: brightness(.95);
}

/* =======================
   PREVIEW
======================= */
.preview {
  margin-top: 16px;
  padding: 14px;
  border-radius: 10px;
  border: 2px dashed #cbd5f5;
  font-size: 14px;
}

/* =======================
   OUTPUT
======================= */
#container {
  margin-top: 12px;
}

.box {
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  animation: fadeIn .25s ease;
  cursor: pointer;
}

.blue {
  background: #eff6ff;
  border-left: 6px solid var(--clr-blue);
}

.green {
  background: #ecfdf5;
  border-left: 6px solid var(--clr-green);
}

.red {
  background: #fef2f2;
  border-left: 6px solid var(--clr-red);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =======================
   FOOTER INFO
======================= */
.meta {
  margin-top: 12px;
  text-align: right;
  font-size: 14px;
  color: var(--clr-muted);
}

/* =======================
   RESPONSIVE
======================= */
@media (max-width: 900px) {
  main {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>Dynamiczne tworzenie elementów DOM</h1>
  <p>Wersja zadbana • semantyczna • edukacyjna</p>
</header>

<main>

<aside class="panel" aria-labelledby="controls">
  <h2 id="controls">Panel sterowania</h2>

  <label>
    Treść elementu
    <input id="textInput" maxlength="40" placeholder="Np. Uczę się JavaScript">
    <div class="error" id="textError"></div>
  </label>

  <label>
    Typ elementu
    <select id="elementType">
      <option value="div">div</option>
      <option value="p">p</option>
      <option value="h3">h3</option>
      <option value="span">span</option>
    </select>
  </label>

  <label>
    Kolor
    <select id="variant">
      <option value="blue">Niebieski</option>
      <option value="green">Zielony</option>
      <option value="red">Czerwony</option>
    </select>
  </label>

  <div class="preview" id="preview">
    Podgląd elementu
  </div>

  <div class="actions">
    <button class="primary" id="add">Dodaj</button>
    <button id="remove">Usuń ostatni</button>
    <button id="clear">Wyczyść</button>
  </div>
</aside>

<section class="panel" aria-labelledby="output">
  <h2 id="output">Wynik</h2>
  <div id="container"></div>
  <div class="meta" id="counter">Elementów: 0</div>
</section>

</main>

<script>
/* =======================
   APPLICATION STATE
======================= */
const state = {
  elements: JSON.parse(localStorage.getItem('elements')) || []
};

/* =======================
   ELEMENT REFERENCES
======================= */
const textInput = document.getElementById('textInput');
const elementType = document.getElementById('elementType');
const variant = document.getElementById('variant');
const container = document.getElementById('container');
const counter = document.getElementById('counter');
const preview = document.getElementById('preview');
const textError = document.getElementById('textError');

/* =======================
   HELPERS
======================= */
const save = () =>
  localStorage.setItem('elements', JSON.stringify(state.elements));

const updateCounter = () =>
  counter.textContent = `Elementów: ${state.elements.length}`;

function validateText(value) {
  if (value.length > 40) {
    textError.textContent = 'Maksymalnie 40 znaków';
    return false;
  }
  textError.textContent = '';
  return true;
}

function createElementBox({ text, type, color }) {
  const el = document.createElement(type);
  el.textContent = text;
  el.className = `box ${color}`;
  return el;
}

/* =======================
   RENDER
======================= */
function render() {
  container.innerHTML = '';

  state.elements.forEach((item, index) => {
    const el = createElementBox(item);
    el.dataset.index = index;
    container.appendChild(el);
  });

  updateCounter();
  save();
}

/* =======================
   PREVIEW
======================= */
function updatePreview() {
  const text = textInput.value.trim() || 'Podgląd';
  preview.className = `preview box ${variant.value}`;
  preview.textContent = `<${elementType.value}> ${text}`;
}

/* =======================
   EVENTS
======================= */
document.getElementById('add').addEventListener('click', () => {
  const text = textInput.value.trim() || 'Domyślny tekst';
  if (!validateText(text)) return;

  state.elements.push({
    text,
    type: elementType.value,
    color: variant.value
  });

  textInput.value = '';
  render();
});

document.getElementById('remove').addEventListener('click', () => {
  state.elements.pop();
  render();
});

document.getElementById('clear').addEventListener('click', () => {
  state.elements = [];
  render();
});

/* event delegation */
container.addEventListener('click', e => {
  if (!e.target.classList.contains('box')) return;
  const index = e.target.dataset.index;
  state.elements.splice(index, 1);
  render();
});

[textInput, elementType, variant]
  .forEach(el => el.addEventListener('input', updatePreview));

/* =======================
   INIT
======================= */
render();
updatePreview();
</script>

</body>
</html>

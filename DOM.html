<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamiczny DOM – ULTRA</title>

<style>
:root {
  --blue: #2196f3;
  --green: #4caf50;
  --red: #f44336;
  --bg: #f4f6f8;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 30px;
  font-family: system-ui, Arial, sans-serif;
  background: var(--bg);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

main {
  max-width: 900px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

section {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,.08);
}

label {
  display: block;
  margin-top: 14px;
  font-weight: 600;
}

input, select, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

input:focus, select:focus {
  outline: 2px solid #2196f3;
  border-color: transparent;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
}

button {
  cursor: pointer;
  font-weight: 700;
  background: #f1f3f5;
}

button:hover {
  background: #e2e6ea;
}

button.primary {
  background: var(--blue);
  color: white;
}

button.primary:hover {
  background: #1976d2;
}

.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 6px;
}

.preview {
  margin-top: 15px;
  padding: 12px;
  border: 2px dashed #bbb;
  border-radius: 8px;
  font-size: 14px;
}

#container {
  margin-top: 15px;
}

.box {
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
  animation: appear .25s ease;
}

.blue { background: #e3f2fd; border-left: 6px solid var(--blue); }
.green { background: #e8f5e9; border-left: 6px solid var(--green); }
.red { background: #fdecea; border-left: 6px solid var(--red); }

@keyframes appear {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.footer {
  grid-column: 1 / -1;
  text-align: right;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<h1>Dynamiczne elementy DOM – ULTRA</h1>

<main>

<section aria-labelledby="panel">
  <h2 id="panel">Panel sterowania</h2>

  <label>
    Tekst elementu
    <input id="textInput" placeholder="Np. Uczę się DOM 😎">
    <div class="error" id="textError"></div>
  </label>

  <label>
    Typ elementu
    <select id="elementType">
      <option value="div">div</option>
      <option value="p">p</option>
      <option value="h3">h3</option>
      <option value="span">span</option>
    </select>
  </label>

  <label>
    Kolor
    <select id="variant">
      <option value="blue">Niebieski</option>
      <option value="green">Zielony</option>
      <option value="red">Czerwony</option>
    </select>
  </label>

  <div class="preview" id="preview">
    Podgląd elementu
  </div>

  <div class="buttons">
    <button class="primary" id="add">Dodaj</button>
    <button id="remove">Usuń ostatni</button>
    <button id="clear">Wyczyść</button>
  </div>
</section>

<section>
  <h2>Wynik</h2>
  <div id="container"></div>
</section>

<div class="footer" id="counter">Elementów: 0</div>

</main>

<script>
/* =====================
   STATE
===================== */
const state = {
  elements: JSON.parse(localStorage.getItem('elements')) || []
};

/* =====================
   ELEMENTY
===================== */
const textInput = document.getElementById('textInput');
const elementType = document.getElementById('elementType');
const variant = document.getElementById('variant');
const container = document.getElementById('container');
const counter = document.getElementById('counter');
const preview = document.getElementById('preview');
const textError = document.getElementById('textError');

/* =====================
   FUNKCJE
===================== */
function save() {
  localStorage.setItem('elements', JSON.stringify(state.elements));
}

function updateCounter() {
  counter.textContent = `Elementów: ${state.elements.length}`;
}

function createBox({ text, type, color }) {
  const el = document.createElement(type);
  el.textContent = text;
  el.className = `box ${color}`;
  return el;
}

function render() {
  container.innerHTML = '';
  state.elements.forEach((item, index) => {
    const el = createBox(item);
    el.dataset.index = index;
    container.appendChild(el);
  });
  updateCounter();
  save();
}

function validate() {
  if (textInput.value.length > 40) {
    textError.textContent = 'Maksymalnie 40 znaków';
    return false;
  }
  textError.textContent = '';
  return true;
}

function updatePreview() {
  const text = textInput.value || 'Podgląd';
  preview.className = `preview box ${variant.value}`;
  preview.textContent = `<${elementType.value}> ${text}`;
}

/* =====================
   EVENTY
===================== */
document.getElementById('add').addEventListener('click', () => {
  if (!validate()) return;

  state.elements.push({
    text: textInput.value || 'Domyślny tekst',
    type: elementType.value,
    color: variant.value
  });

  textInput.value = '';
  render();
});

document.getElementById('remove').addEventListener('click', () => {
  state.elements.pop();
  render();
});

document.getElementById('clear').addEventListener('click', () => {
  state.elements = [];
  render();
});

/* event delegation */
container.addEventListener('click', e => {
  if (!e.target.classList.contains('box')) return;
  const index = e.target.dataset.index;
  state.elements.splice(index, 1);
  render();
});

[textInput, elementType, variant].forEach(el =>
  el.addEventListener('input', updatePreview)
);

/* =====================
   INIT
===================== */
render();
updatePreview();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Tworzenie elementów DOM – wariacje</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 40px;
    }

    section {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 6px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select, button {
      margin-top: 5px;
      padding: 6px;
    }

    .box {
      margin: 6px 0;
      padding: 10px;
      background: #e3f2fd;
    }
  </style>
</head>
<body>

<h1>Dynamiczne tworzenie elementów DOM</h1>

<!-- ===================== -->
<!-- FORMULARZ -->
<!-- ===================== -->
<section>
  <h2>Tworzenie własnego elementu</h2>

  <label>
    Tekst elementu:
    <input type="text" id="textInput" placeholder="Wpisz własny tekst">
  </label>

  <label>
    Typ elementu:
    <select id="elementType">
      <option value="div">div</option>
      <option value="p">p</option>
      <option value="h3">h3</option>
      <option value="span">span</option>
    </select>
  </label>

  <label>
    Wariant wyglądu:
    <select id="variant">
      <option value="blue">Niebieski</option>
      <option value="green">Zielony</option>
      <option value="red">Czerwony</option>
    </select>
  </label>

  <button id="add">Dodaj element</button>
  <button id="remove">Usuń ostatni</button>
</section>

<!-- ===================== -->
<!-- KONTENER -->
<!-- ===================== -->
<section>
  <h2>Wynik</h2>
  <div id="container"></div>
</section>

<script>
  // Pobranie elementów formularza
  const textInput = document.getElementById('textInput');
  const elementType = document.getElementById('elementType');
  const variant = document.getElementById('variant');
  const container = document.getElementById('container');

  const addBtn = document.getElementById('add');
  const removeBtn = document.getElementById('remove');

  // =====================
  // DODAWANIE ELEMENTU
  // =====================
  addBtn.addEventListener('click', function () {

    // Tworzenie elementu wybranego przez użytkownika
    const element = document.createElement(elementType.value);

    // Tworzenie bezpiecznego tekstu
    const text = document.createTextNode(
      textInput.value || 'Domyślny tekst'
    );

    element.appendChild(text);
    element.classList.add('box');

    // WARIACJE WYGLĄDU
    if (variant.value === 'blue') {
      element.style.borderLeft = '5px solid #2196f3';
    }

    if (variant.value === 'green') {
      element.style.borderLeft = '5px solid #4caf50';
      element.style.background = '#e8f5e9';
    }

    if (variant.value === 'red') {
      element.style.borderLeft = '5px solid #f44336';
      element.style.background = '#fdecea';
    }

    // Dodanie elementu do DOM
    container.appendChild(element);

    // Czyszczenie inputa
    textInput.value = '';
  });

  // =====================
  // USUWANIE ELEMENTU
  // =====================
  removeBtn.addEventListener('click', function () {
    const last = container.lastElementChild;
    if (last) last.remove();
  });
</script>

</body>
</html>
